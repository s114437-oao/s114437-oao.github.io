<!DOCTYPE html><html lang='zh-Hant'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>最後的夏天計畫</title><style>
body{margin:0;font-family:sans-serif;background:#edf2ff}.screen{max-width:1200px;margin:auto;padding:20px}.card{background:#fff;padding:20px;border-radius:18px}.hidden{display:none}#mapWrap{position:relative;max-width:1100px;margin:auto}#map{width:100%}.hit{position:absolute;background:rgba(100,120,255,.18);border:none;border-radius:10px;cursor:pointer}.hit:hover{background:rgba(100,120,255,.35)}#story{min-height:180px;background:#fafafa;padding:16px;border-radius:10px;margin:10px 0}.choice{padding:10px 14px;margin:5px}
</style></head><body>
<div class='screen'>
<div id='home' class='card'><h1>🎓 最後的夏天計畫</h1><p>把校園圖放同資料夾並命名 map.png</p><button onclick='start()'>開始遊戲</button></div>
<div id='game' class='hidden'><div class='card'>
<div>❤️<span id='f'>0</span> 📘<span id='s'>0</span> ⭐<span id='c'>0</span> 🔍<span id='cl'>0</span>/8</div>
<div id='mapWrap'><img src='map.png' id='map'>
<button class='hit' style='left:14%;top:10%;width:18%;height:12%' onclick="go('art')"></button>
<button class='hit' style='left:6%;top:36%;width:18%;height:16%' onclick="go('gym')"></button>
<button class='hit' style='left:22%;top:56%;width:25%;height:12%' onclick="go('main')"></button>
<button class='hit' style='left:48%;top:55%;width:14%;height:12%' onclick="go('library')"></button>
<button class='hit' style='left:68%;top:54%;width:20%;height:16%' onclick="go('lab')"></button>
<button class='hit' style='left:70%;top:32%;width:20%;height:14%' onclick="go('activity')"></button>
<button class='hit' style='left:18%;top:78%;width:18%;height:10%' onclick="go('tree')"></button>
<button class='hit' style='left:46%;top:15%;width:40%;height:18%' onclick="go('field')"></button>
</div>
<div id='story'>點建築開始</div><div id='choices'></div>
<button onclick='location.reload()'>🏠回首頁</button></div></div></div>
<script>
let F=0,S=0,C=0,L=0,V=[];
function start(){home.style.display='none';game.classList.remove('hidden')}
function u(){f.textContent=F;s.textContent=S;c.textContent=C;cl.textContent=L;if(L>=8)e()}
function add(n){if(!V.includes(n)){V.push(n);L++;u()}}
function sc(t,arr){story.innerHTML=t;choices.innerHTML='';arr.forEach(x=>{let b=document.createElement('button');b.className='choice';b.textContent=x[0];b.onclick=x[1];choices.appendChild(b)})}
function end(){story.innerHTML='返回地圖';choices.innerHTML=''}
function go(p){
const D={
library:["📚圖書館",[["一起讀書",()=>{S+=2;add(p);end()}],["翻畢冊",()=>{F+=2;add(p);end()}]]],
gym:["🏟️體育館",[["籃球",()=>{F++;C++;add(p);end()}],["游泳",()=>{C+=2;add(p);end()}]]],
art:["🎨藝能大樓",[["音樂",()=>{F+=2;add(p);end()}],["資訊",()=>{S+=2;add(p);end()}]]],
lab:["🧪實驗中心",[["物理",()=>{S+=2;add(p);end()}]]],
activity:["🏢活動中心",[["閱讀任務",()=>{S++;add(p);end()}]]],
main:["🏫綜合大樓",[["安慰朋友",()=>{F+=2;add(p);end()}]]],
tree:["🌳榕園",[["留下紙條",()=>{F++;C++;add(p);end()}]]],
field:["🏃田徑場",[["參加訓練",()=>{C+=2;add(p);end()}]]]
};
sc(D[p][0],D[p][1])
}
function e(){story.innerHTML=(F>=S&&F>=C?'❤️友情':S>=F&&S>=C?'📘學霸':'⭐勇氣')+' 結局';choices.innerHTML="<button onclick='location.reload()'>🔄重新開始</button>"}
u()
</script></body></html>
