<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>最後的夏天計畫 - 互動文字遊戲</title>
  <style>
    :root {
      --primary-color: #4a6fa5;
      --bg-color: #e5e9f0;
      --text-color: #333;
      --card-bg: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Microsoft JhengHei", sans-serif;
    }

    /* --- 滿版佈局核心設定 --- */
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      height: 100vh; /* 滿版高度 */
      width: 100vw;  /* 滿版寬度 */
      overflow: hidden; /* 防止整個頁面出現外層捲軸 */
    }

    #game-container {
      width: 100%;
      height: 100%;
      background: var(--card-bg);
      display: flex;
      flex-direction: column;
    }

    /* 頂部狀態列 */
    header {
      background: var(--primary-color);
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0; /* 確保標題列不會被壓縮 */
    }

    header h1 {
      font-size: 1.4rem;
    }

    .backpack {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag-badge {
      background: rgba(255, 255, 255, 0.2);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.85rem;
      border: 1px solid rgba(255, 255, 255, 0.4);
    }

    /* 遊戲主畫面彈性佈局 */
    .main-content {
      display: flex;
      flex-direction: row;
      flex: 1; /* 填滿標題列以下的剩餘空間 */
      overflow: hidden;
    }

    /* 左側地圖區 */
    .map-wrapper {
      flex: 1.5; /* 佔據比例可微調 */
      background: var(--bg-color);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto; /* 允許地圖區內部滾動 */
      padding: 10px;
    }

    /* 增加這層容器來鎖定比例，確保座標絕對準確 */
    .map-inner-container {
      position: relative;
      width: 100%;
      max-width: 900px; /* 防止在大螢幕上地圖被無限放大變模糊 */
    }

    .map-image {
      width: 100%;
      height: auto;
      display: block;
    }

    /* --- 點擊區域樣式修改 (透明化) --- */
    .clickable-area {
      position: absolute;
      cursor: pointer;
      background-color: transparent; /* 變成完全透明 */
      border: none; /* 移除虛線邊框 */
      border-radius: 6px;
      transition: all 0.2s;
    }

    /* 保留滑鼠移過時微微發亮的提示感，讓玩家知道可以點擊 */
    .clickable-area:hover {
      background-color: rgba(255, 255, 255, 0.3);
    }

    /* 右側敘事與對話面板 */
    .story-panel {
      flex: 1;
      padding: 30px;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #e0e0e0;
      background: #fafafa;
      overflow-y: auto; /* 劇情文字太長時可獨立滾動 */
    }

    .story-text {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 25px;
      white-space: pre-line;
    }

    .location-title {
      font-size: 1.4rem;
      color: var(--primary-color);
      margin-bottom: 15px;
      font-weight: bold;
      border-bottom: 2px solid var(--primary-color);
      padding-bottom: 8px;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: auto; /* 把按鈕推到面板底部 */
    }

    button {
      padding: 14px 18px;
      font-size: 1rem;
      background: #ffffff;
      border: 2px solid var(--primary-color);
      color: var(--primary-color);
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
      text-align: left;
    }

    button:hover {
      background: var(--primary-color);
      color: white;
    }

    button.nav-btn {
      background: #6c757d;
      border-color: #6c757d;
      color: white;
      text-align: center;
    }
    button.nav-btn:hover {
      background: #5a6268;
    }

    /* 最終章黑幕特效 */
    #ending-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #0b0c10;
      color: #fff;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      z-index: 9999;
    }

    .ending-title {
      font-size: 2rem;
      color: #66fcf1;
      margin-bottom: 30px;
      opacity: 0;
      transition: opacity 1.5s;
    }

    .typewriter-text {
      font-size: 1.3rem;
      line-height: 2;
      max-width: 700px;
      text-align: center;
      min-height: 100px;
      color: #c5a880;
    }

    .restart-btn {
      margin-top: 20px;
      background: transparent;
      border: 1px solid #fff;
      color: #fff;
      padding: 12px 24px;
      display: none;
      text-align: center;
    }
    .restart-btn:hover {
      background: #fff;
      color: #000;
    }

    /* --- 手機版響應式設計 (RWD) --- */
    @media (max-width: 768px) {
      .main-content { 
        flex-direction: column; 
        overflow-y: auto; /* 手機版讓整體可以上下滑動 */
      }
      .map-wrapper {
        flex: none;
        overflow: visible;
        padding: 15px;
      }
      .story-panel { 
        flex: none;
        border-left: none; 
        border-top: 2px solid #e0e0e0; 
      }
      header {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
    }
  </style>
</head>
