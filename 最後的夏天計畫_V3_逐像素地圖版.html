<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>校園地圖 V3（逐像素對齊）</title>
<style>
body{margin:0;font-family:"Microsoft JhengHei",sans-serif;background:#eef3ff}
.wrap{max-width:1200px;margin:auto;padding:20px}
.card{background:#fff;padding:18px;border-radius:18px}
.mapBox{position:relative}
#map{width:100%;display:block;border-radius:14px}
svg{position:absolute;inset:0;width:100%;height:100%}
.zone{fill:rgba(80,120,255,.06);stroke:rgba(80,120,255,.55);stroke-width:2;cursor:pointer}
.zone:hover{fill:rgba(80,120,255,.25)}
#hud{
position:absolute;right:14px;top:14px;
background:rgba(255,255,255,.95);
padding:10px 14px;border-radius:12px
}
#panel{margin-top:14px;padding:16px;background:#fafafa;border-radius:12px;min-height:150px}
button{padding:8px 12px}
</style>
</head>
<body>
<div class="wrap">
<div class="card">
<h1>🎓 最後的夏天計畫 V3</h1>

<div class="mapBox">

<img id="map" src="map.png">

<div id="hud">
❤️ <span id="f">0</span><br>
📘 <span id="s">0</span><br>
⭐ <span id="c">0</span><br>
🔍 <span id="l">0</span>/8
</div>

<!-- 座標依圖片 1000×700 比例校正 -->
<div class="map-container">
  <img src="map.png" alt="校園地圖" class="map-image">

  <a href="#art" class="clickable-area" style="left: 22%; top: 13%; width: 18%; height: 12%;" title="藝能大樓"></a>
  <a href="#volleyball" class="clickable-area" style="left: 52%; top: 24%; width: 11%; height: 13%;" title="排球場"></a>
  <a href="#basketball" class="clickable-area" style="left: 15%; top: 22%; width: 6%; height: 25%;" title="籃球場"></a>
  <a href="#gym" class="clickable-area" style="left: 2%; top: 41%; width: 13%; height: 19%;" title="體育館"></a>
  <a href="#track" class="clickable-area" style="left: 24%; top: 26%; width: 19%; height: 39%;" title="田徑場"></a>
  <a href="#activity" class="clickable-area" style="left: 50%; top: 42%; width: 16%; height: 18%;" title="學生活動中心"></a>
  <a href="#general" class="clickable-area" style="left: 4%; top: 67%; width: 31%; height: 18%;" title="綜合大樓"></a>
  <a href="#library" class="clickable-area" style="left: 39%; top: 67%; width: 8%; height: 14%;" title="圖書館"></a>
  <a href="#banyan" class="clickable-area" style="left: 48%; top: 68%; width: 8%; height: 13%;" title="榕園"></a>
  <a href="#science" class="clickable-area" style="left: 57%; top: 64%; width: 10%; height: 18%;" title="實驗中心"></a>
</div>

<style>
  /* 容器需設定為 relative，這樣內部的絕對定位才會以它為基準 */
  .map-container {
    position: relative;
    width: 100%;
    max-width: 1200px; /* 可依你的版面需求調整 */
    margin: 0 auto;
  }
  
  .map-image {
    width: 100%;
    height: auto;
    display: block;
  }
  
  /* 點擊區域的基本設定 */
  .clickable-area {
    position: absolute;
    display: block;
    cursor: pointer;
    /* 開發測試用：顯示半透明紅色區塊以便對齊，完成後可註解或刪除 */
    background-color: rgba(255, 0, 0, 0.3); 
    border-radius: 8px; /* 讓邊角稍微圓潤一點 */
  }

  /* 滑鼠移過去時的提示效果 */
  .clickable-area:hover {
    background-color: rgba(255, 255, 255, 0.4);
  }
</style>

</svg>

</div>

<div id="panel">
點建築開始探索
</div>

<button onclick="location.reload()">🔄重新開始</button>

</div>
</div>

<script>
let F=0,S=0,C=0,L=0;
const done=new Set();

function update(){
f.textContent=F;
s.textContent=S;
c.textContent=C;
l.textContent=L;
}

function reward(id,a,b,d,text){
if(!done.has(id)){
done.add(id);
F+=a;S+=b;C+=d;L++;
}
update();
panel.innerHTML=text+"<br><br>✔ 已完成探索";
}

function openPlace(p){
const D={
art:["🎨 藝能大樓：成果發表準備中。",()=>reward(p,2,0,0,"一起完成作品。")],
gym:["🏟 體育館：班際比賽熱身。",()=>reward(p,1,0,2,"完成訓練。")],
main:["🏫 綜合大樓：討論分班。",()=>reward(p,2,1,0,"留下回憶。")],
library:["📚 圖書館：找到學姊信件。",()=>reward(p,1,2,0,"獲得線索。")],
lab:["🧪 實驗中心：完成小實驗。",()=>reward(p,0,2,1,"找到答案。")],
activity:["🏢 活動中心：收到學生會任務。",()=>reward(p,1,1,1,"接受任務。")],
tree:["🌳 榕園：寫下願望。",()=>reward(p,1,0,1,"收藏紙條。")],
field:["🏃 田徑場：最後一次練習。",()=>reward(p,0,0,2,"一起奔跑。")]
};

panel.innerHTML=
"<h2>"+D[p][0]+"</h2><button onclick='("+D[p][1].toString()+")()'>進入事件</button>";
}
update();
</script>
</body>
</html>
