
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>最後的夏天計畫 V2</title>
<style>
body{margin:0;background:#eef3ff;font-family:"Microsoft JhengHei",sans-serif}
#home,#game{max-width:1200px;margin:auto;padding:18px}
.card{background:white;border-radius:18px;padding:18px;box-shadow:0 8px 20px rgba(0,0,0,.08)}
.hidden{display:none}
#mapWrap{position:relative;width:min(100%,1000px);margin:auto}
#map{width:100%;display:block;border-radius:16px}
.zone{
position:absolute;border:none;background:rgba(88,120,255,.08);
cursor:pointer;border-radius:12px
}
.zone:hover{background:rgba(88,120,255,.22)}
#hud{
position:absolute;right:10px;top:10px;
background:rgba(255,255,255,.92);
padding:10px 14px;border-radius:14px;
font-size:18px;line-height:1.8
}
#story{
margin-top:16px;background:#fafafa;border-radius:14px;
padding:18px;min-height:180px
}
button{
padding:10px 16px;border:none;border-radius:10px;cursor:pointer
}
.choice{margin:6px;background:#6d8cff;color:white}
.menu{margin-top:10px}
</style>
</head>
<body>

<div id="home">
<div class="card">
<h1>🎓 最後的夏天計畫</h1>
<p>把你的校園圖放在同資料夾並命名為 <b>map.png</b></p>
<button class="choice" onclick="start()">開始遊戲</button>
</div>
</div>

<div id="game" class="hidden">
<div class="card">

<div id="mapWrap">

<img id="map" src="map.png">

<div id="hud">
❤️ <span id="f">0</span><br>
📘 <span id="s">0</span><br>
⭐ <span id="c">0</span><br>
🔍 <span id="l">0</span>/8
</div>

<!-- 校正後區域 -->
<button class="zone" style="left:14%;top:12%;width:24%;height:13%" onclick="scene('art')"></button>
<button class="zone" style="left:5%;top:38%;width:18%;height:17%" onclick="scene('gym')"></button>
<button class="zone" style="left:23%;top:58%;width:26%;height:12%" onclick="scene('main')"></button>
<button class="zone" style="left:48%;top:56%;width:12%;height:12%" onclick="scene('library')"></button>
<button class="zone" style="left:65%;top:55%;width:22%;height:14%" onclick="scene('lab')"></button>
<button class="zone" style="left:68%;top:33%;width:20%;height:13%" onclick="scene('activity')"></button>
<button class="zone" style="left:18%;top:80%;width:18%;height:10%" onclick="scene('tree')"></button>
<button class="zone" style="left:45%;top:14%;width:42%;height:18%" onclick="scene('field')"></button>

</div>

<div id="story">點地圖上的建築開始探索。</div>
<div id="choices"></div>

<div class="menu">
<button onclick="resetGame()">🔄重新開始</button>
<button onclick="goHome()">🏠回首頁</button>
</div>

</div>
</div>

<script>
let F=0,S=0,C=0,L=0;
const done=new Set();

function update(){
f.textContent=F;
s.textContent=S;
c.textContent=C;
l.textContent=L;
if(L===8) ending();
}

function start(){
home.classList.add("hidden");
game.classList.remove("hidden");
update();
}

function resetGame(){
F=S=C=L=0;
done.clear();
story.innerHTML="重新開始完成。";
choices.innerHTML="";
update();
}

function goHome(){location.reload();}

function gain(place,a,b,d){
if(done.has(place)) return;
done.add(place);
F+=a;S+=b;C+=d;L++;
update();
story.innerHTML += "<br><br>已獲得線索。";
choices.innerHTML="<button class='choice' onclick='backMap()'>返回地圖</button>";
}

function backMap(){
story.innerHTML="點地圖繼續探索。";
choices.innerHTML="";
}

function addChoice(t,fn){
const b=document.createElement("button");
b.className="choice";
b.textContent=t;
b.onclick=fn;
choices.appendChild(b);
}

function scene(p){
choices.innerHTML="";
const data={
art:["🎨藝能大樓：成果發表前夕。",[["去音樂教室",()=>gain(p,2,0,0)],["去資訊教室",()=>gain(p,0,2,0)]]],
gym:["🏟體育館：班際賽前最後練習。",[["上場",()=>gain(p,1,0,2)],["陪同學",()=>gain(p,2,0,0)]]],
main:["🏫綜合大樓：大家討論分班。",[["聊天",()=>gain(p,2,0,0)],["規劃讀書",()=>gain(p,0,2,0)]]],
library:["📚圖書館：找到學姊留下的信。",[["閱讀",()=>gain(p,1,2,0)]]],
lab:["🧪實驗中心：完成解謎。",[["開始實驗",()=>gain(p,0,2,1)]]],
activity:["🏢活動中心：學生會留下任務。",[["接受",()=>gain(p,0,1,1)]]],
tree:["🌳榕園：寫給未來自己的話。",[["留下紙條",()=>gain(p,1,0,1)]]],
field:["🏃田徑場：大家正在練習。",[["加入",()=>gain(p,0,0,2)]]]
};
story.innerHTML=data[p][0];
data[p][1].forEach(v=>addChoice(v[0],v[1]));
}

function ending(){
story.innerHTML="<h2>🎁 終章</h2>";
if(F>=S&&F>=C) story.innerHTML+="❤️友情結局";
else if(S>=F&&S>=C) story.innerHTML+="📘學霸結局";
else story.innerHTML+="⭐勇氣結局";

if(F>=6&&S>=6&&C>=6)
story.innerHTML+="<br><br>🌈 真結局：青春的答案";

choices.innerHTML="<button class='choice' onclick='resetGame()'>重新開始</button>";
}
</script>

</body>
</html>
