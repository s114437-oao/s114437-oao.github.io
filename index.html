<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>最後的夏天計畫（簡易版）</title>

<style>
body{
    font-family:"Microsoft JhengHei",sans-serif;
    background:#f3f6ff;
    padding:30px;
}

.container{
    max-width:800px;
    margin:auto;
}

h1{
    text-align:center;
    color:#4b5fc9;
}

#story{
    background:white;
    padding:20px;
    border-radius:12px;
    min-height:150px;
    margin-bottom:20px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

#stats{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:20px;
}

button{
    padding:10px 18px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#6d8cff;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#4d6ff0;
}
</style>
</head>

<body>

<div class="container">

<h1>🎓 最後的夏天計畫</h1>

<div id="stats">
友情值：<span id="friendship">0</span> |
學業值：<span id="study">0</span> |
勇氣值：<span id="courage">0</span>
</div>

<div id="story">
高一下學期最後一天。

下週即將公布高二分班名單。

學生會在活動中心宣布：

「完成校園探索任務的人，將找到屬於自己的答案。」
</div>

<div id="choices"></div>

</div>

<script>

let friendship = 0;
let study = 0;
let courage = 0;

let visited = [];

const story = document.getElementById("story");
const choices = document.getElementById("choices");

function updateStats(){
    document.getElementById("friendship").innerText = friendship;
    document.getElementById("study").innerText = study;
    document.getElementById("courage").innerText = courage;
}

function addButton(text, action){
    const btn = document.createElement("button");
    btn.innerText = text;
    btn.onclick = action;
    choices.appendChild(btn);
}

function visit(place){
    if(!visited.includes(place)){
        visited.push(place);
    }
}

function mainMenu(){

    if(visited.length >= 7){
        ending();
        return;
    }

    choices.innerHTML = "";

    story.innerHTML = `
    <h2>📍活動中心</h2>
    已探索地點：${visited.length}/7
    <br><br>
    請選擇下一個地點。
    `;

    addButton("📚 圖書館", library);
    addButton("🏫 教室", classroom);
    addButton("🏃 操場", playground);
    addButton("🏟 體育館", gym);
    addButton("🎨 藝能大樓", artBuilding);
    addButton("🧪 實驗大樓", labBuilding);
    addButton("➗ 數學科辦公室", mathOffice);
}

function library(){

    visit("圖書館");

    story.innerHTML =
    `
    <h2>📚 圖書館</h2>
    你遇見正在讀書的學霸同學。
    `;

    choices.innerHTML="";

    addButton("一起解題", ()=>{
        study += 2;
        updateStats();
        mainMenu();
    });

    addButton("翻閱舊畢冊", ()=>{
        friendship += 2;
        updateStats();
        mainMenu();
    });
}

function classroom(){

    visit("教室");

    story.innerHTML =
    `
    <h2>🏫 教室</h2>
    同學們正在討論分班。
    `;

    choices.innerHTML="";

    addButton("安慰朋友", ()=>{
        friendship += 2;
        updateStats();
        mainMenu();
    });

    addButton("討論暑假讀書計畫", ()=>{
        study += 1;
        updateStats();
        mainMenu();
    });
}

function playground(){

    visit("操場");

    story.innerHTML =
    `
    <h2>🏃 操場</h2>
    接力隊正在訓練。
    `;

    choices.innerHTML="";

    addButton("加入訓練", ()=>{
        courage += 2;
        updateStats();
        mainMenu();
    });

    addButton("幫忙加油", ()=>{
        friendship += 1;
        updateStats();
        mainMenu();
    });
}

function gym(){

    visit("體育館");

    story.innerHTML =
    `
    <h2>🏟 體育館</h2>

    1樓 游泳池<br>
    2樓 籃球場、舞蹈教室<br>
    3樓 桌球場<br>
    4樓 羽球場
    `;

    choices.innerHTML="";

    addButton("🏊 游泳池", ()=>{
        courage += 2;
        updateStats();
        mainMenu();
    });

    addButton("🏀 籃球場", ()=>{
        friendship += 1;
        courage += 1;
        updateStats();
        mainMenu();
    });

    addButton("💃 舞蹈教室", ()=>{
        friendship += 2;
        updateStats();
        mainMenu();
    });

    addButton("🏓 桌球場", ()=>{
        study += 1;
        updateStats();
        mainMenu();
    });

    addButton("🏸 羽球場", ()=>{
        courage += 1;
        friendship += 1;
        updateStats();
        mainMenu();
    });
}

function artBuilding(){

    visit("藝能大樓");

    story.innerHTML =
    `
    <h2>🎨 藝能大樓</h2>
    音樂教室、美術教室、資訊教室。
    `;

    choices.innerHTML="";

    addButton("🎵 音樂教室", ()=>{
        friendship += 2;
        updateStats();
        mainMenu();
    });

    addButton("🖌 美術教室", ()=>{
        friendship += 1;
        courage += 1;
        updateStats();
        mainMenu();
    });

    addButton("💻 資訊教室", ()=>{
        study += 2;
        updateStats();
        mainMenu();
    });
}

function labBuilding(){

    visit("實驗大樓");

    story.innerHTML =
    `
    <h2>🧪 實驗大樓</h2>
    物理、化學、生物實驗室。
    `;

    choices.innerHTML="";

    addButton("⚛️ 物理實驗室", ()=>{
        study += 2;
        updateStats();
        mainMenu();
    });

    addButton("🧫 化學實驗室", ()=>{
        study += 1;
        courage += 1;
        updateStats();
        mainMenu();
    });

    addButton("🧬 生物實驗室", ()=>{
        friendship += 1;
        study += 1;
        updateStats();
        mainMenu();
    });
}

function mathOffice(){

    visit("數學科辦公室");

    let answer = prompt("老師留下謎題：2 + 3 × 4 = ?");

    if(answer === "14"){
        study += 3;
        alert("答對了！");
    }else{
        alert("答錯了！");
    }

    updateStats();
    mainMenu();
}

function ending(){

    choices.innerHTML="";

    story.innerHTML =
    `
    <h2>🎁 最終答案</h2>

    學生會長拿出時光膠囊。

    裡面裝著學姊們寫給未來自己的信。
    `;

    if(friendship >= study && friendship >= courage){

        story.innerHTML +=
        "<h3>❤️ 友情結局</h3>即使分班後，大家依然是最好的朋友。";

    }else if(study >= friendship && study >= courage){

        story.innerHTML +=
        "<h3>📖 學霸結局</h3>你找到了努力的方向。";

    }else{

        story.innerHTML +=
        "<h3>⭐ 勇氣結局</h3>你勇敢迎接新的挑戰。";
    }

    if(friendship >= 5 && study >= 5 && courage >= 5){

        story.innerHTML +=
        "<h2>🌈 真結局：青春的答案</h2>";
    }

    addButton("🔄 重新開始", ()=>{
        friendship = 0;
        study = 0;
        courage = 0;
        visited = [];

        updateStats();
        mainMenu();
    });
}

updateStats();
mainMenu();

</script>

</body>
</html>
